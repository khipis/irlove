# Deploy to GitHub Pages on push to main
# App: https://khipis.github.io/irlove/
#
# If you see "Get Pages site failed" / HttpError Not Found:
# → Go to repo Settings → Pages → Build and deployment
# → Set "Source" to "GitHub Actions" (not "Deploy from a branch")
# → Save; then re-run the workflow or push again.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare static site (frontend only, no server/)
        run: |
          mkdir -p _site
          cp index.html styles.css locales.js _site/
          cp -r js _site/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact (static site)
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
