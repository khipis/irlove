# =============================================================================
# Deploy STATIC site only (index.html + CSS/JS) to GitHub Pages. No Node server.
# Site URL after deploy: https://khipis.github.io/irlove/
# =============================================================================
#
# ❗ IF DEPLOY FAILS with "Get Pages site failed" or "HttpError: Not Found":
#
#   1. Open: https://github.com/khipis/irlove/settings/pages
#   2. Under "Build and deployment" → "Source" choose: "GitHub Actions"
#   3. Save. Then re-run the workflow (Actions tab → Deploy to GitHub Pages → Re-run)
#
#   Pages must be enabled with source "GitHub Actions" once in repo settings.
#   This workflow cannot enable it for you.
#
# Node.js 24: FORCE_JAVASCRIPT_ACTIONS_TO_NODE24 avoids Node 20 deprecation warning.
# =============================================================================

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare static site (frontend only, no server/)
        run: |
          mkdir -p _site
          cp index.html styles.css locales.js _site/
          cp -r js _site/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact (static site)
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
