<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#1a1a2e" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>IRLove – spotkania na żywo</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <!-- Start / profile -->
    <section id="screen-start" class="screen active">
      <div class="start-content">
        <h1 class="logo">IRLove</h1>
        <p class="tagline" data-i18n="start_tagline">Zobacz kto jest w okolicy i umów się na spotkanie</p>
        <div class="theme-buttons" role="group" aria-label="Kolorystyka">
          <button type="button" class="btn-theme" data-theme="1" title="Warm">🌅</button>
          <button type="button" class="btn-theme" data-theme="2" title="Ocean">🌊</button>
          <button type="button" class="btn-theme" data-theme="3" title="Forest">🌲</button>
          <button type="button" class="btn-theme" data-theme="4" title="Twilight">🌙</button>
        </div>
        <p class="instruction" data-i18n="start_instruction">Uzupełnij profil i wejdź na mapę</p>
        <div class="profile-form">
          <label><span data-i18n="profile_display_name">Nick / imię</span></label>
          <input type="text" id="profile-display-name" maxlength="32" placeholder="" data-i18n-placeholder="profile_display_name" />
          <label><span data-i18n="profile_age">Wiek</span></label>
          <input type="text" id="profile-age" maxlength="4" placeholder="25" />
          <label><span data-i18n="profile_height">Wzrost (cm)</span></label>
          <input type="text" id="profile-height" maxlength="6" placeholder="170" />
          <label><span data-i18n="profile_avatar">Avatar (emoji)</span></label>
          <div class="avatar-row">
            <input type="text" id="profile-avatar" maxlength="200" placeholder="👤" />
            <button type="button" id="btn-random-avatar" class="btn-random-avatar" title="" data-i18n-title="btn_random_avatar">🎲</button>
          </div>
          <div id="avatar-toolbox" class="avatar-toolbox" aria-label="Wybierz avatar"></div>
          <label><span data-i18n="profile_tags">Dostępność</span></label>
          <div class="tag-buttons">
            <button type="button" class="btn-tag" data-tag="chat" data-i18n="profile_tag_chat">Pogadać</button>
            <button type="button" class="btn-tag" data-tag="date" data-i18n="profile_tag_date">Randka</button>
            <button type="button" class="btn-tag" data-tag="beer" data-i18n="profile_tag_beer">Piwo</button>
          </div>
        </div>
        <button type="button" id="btn-fill-random" class="btn-fill-random" data-i18n="btn_fill_random">Wypełnij losowo (test)</button>
        <button type="button" id="btn-enter-map" class="btn-primary" data-i18n="start_btn_enter">Wejdź na mapę</button>
        <div class="lang-switcher" role="group" aria-label="Language">
          <button type="button" class="btn-lang selected" data-lang="pl" title="Polski">PL</button>
          <button type="button" class="btn-lang" data-lang="en" title="English">EN</button>
        </div>
      </div>
    </section>

    <!-- Map -->
    <section id="screen-map" class="screen">
      <div id="map-container" class="map-container"></div>
      <div id="map-overlay">
        <div id="status-bar">
          <span id="status-text" data-i18n="map_status_loading">Ładowanie…</span>
        </div>
        <p id="map-nearby-hint" class="map-nearby-hint" data-i18n="map_nearby">W pobliżu</p>
        <div id="notifications-hint" class="notifications-hint">
          <button type="button" id="btn-enable-notifications" class="btn-notifications" data-i18n="notifications_enable">🔔 Włącz powiadomienia</button>
        </div>
      </div>
      <button type="button" id="btn-profile-map" class="btn-fab" data-i18n-title="btn_profile" title="Profil">👤</button>
      <button type="button" id="btn-back" class="btn-back" data-i18n="btn_back">Wstecz</button>
    </section>

    <!-- Chat overlay -->
    <div id="chat-overlay" class="chat-overlay hidden">
      <div class="chat-panel">
        <div class="chat-header">
          <span id="chat-with-name" data-i18n="chat_with">Z</span>
          <button type="button" id="btn-chat-close" class="btn-close" data-i18n="btn_close">Zamknij</button>
        </div>
        <div id="chat-messages" class="chat-messages"></div>
        <div class="chat-input-row">
          <input type="text" id="chat-input" class="chat-input" maxlength="500" placeholder="" data-i18n-placeholder="chat_placeholder" />
          <button type="button" id="btn-chat-send" class="btn-send" data-i18n="chat_send">Wyślij</button>
        </div>
      </div>
    </div>

    <div id="toast-container" class="toast-container" aria-live="polite"></div>
  </div>

  <!-- Optional: set relay URL before app scripts (after deploying server) -->
  <!-- <script>window.IRLOVE_RELAY_URL = 'https://your-relay.example/gun';</script> -->
  <script src="locales.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gun/sea.js"></script>
  <script src="js/core/config.js"></script>
  <script src="js/core/state.js"></script>
  <script src="js/storage/profile.js"></script>
  <script src="js/ui/locale.js"></script>
  <script src="js/map/map.js"></script>
  <script src="js/services/gun.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
