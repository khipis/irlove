<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0f0f12" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>IRLove – spotkania na żywo</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app" class="app">
    <!-- Start / profile -->
    <section id="screen-start" class="screen screen--start active">
      <header class="logo-header" aria-label="IRLove">
        <h1 class="logo"><span class="logo-a">IRL</span><span class="logo-heart" aria-hidden="true">♥</span><span class="logo-b">ove</span></h1>
      </header>
      <div class="start-content">
        <div class="profile-form">
          <label class="form-label"><span data-i18n="profile_display_name">Nick / imię</span></label>
          <input type="text" id="profile-display-name" class="form-input" maxlength="40" placeholder="" data-i18n-placeholder="profile_display_name" />
          <label class="form-label"><span data-i18n="profile_age">Wiek</span></label>
          <input type="number" id="profile-age" class="form-input" min="16" max="105" placeholder="25" inputmode="numeric" />
          <label class="form-label"><span data-i18n="profile_height">Wzrost (cm)</span></label>
          <input type="number" id="profile-height" class="form-input" min="30" max="240" placeholder="170" inputmode="numeric" />
          <div class="gender-avatar-mood-row">
            <div class="gender-block">
              <label class="form-label"><span data-i18n="profile_gender">Płeć</span></label>
              <div class="gender-buttons">
                <button type="button" class="btn-gender" data-gender="f" data-i18n="profile_gender_f">K</button>
                <button type="button" class="btn-gender" data-gender="m" data-i18n="profile_gender_m">M</button>
                <button type="button" class="btn-gender" data-gender="other" data-i18n="profile_gender_other">Inna</button>
              </div>
            </div>
            <div class="avatar-block">
              <label class="form-label"><span data-i18n="profile_avatar">Avatar</span></label>
              <div class="avatar-current-row">
                <button type="button" id="profile-avatar-preview" class="avatar-current btn-preview" title="" data-i18n-title="profile_choose" aria-label="Wybierz avatar">👤</button>
              </div>
            </div>
            <div class="mood-block">
              <label class="form-label"><span data-i18n="profile_mood">Nastrój</span></label>
              <div class="mood-current-row">
                <button type="button" id="profile-mood-preview" class="mood-current btn-preview" title="" data-i18n-title="profile_choose" aria-label="Wybierz nastrój"></button>
              </div>
            </div>
          </div>
          <div id="avatar-toolbox" class="toolbox-overlay hidden" aria-label="Wybierz avatar">
            <div class="toolbox-overlay-inner">
              <div class="toolbox-grid" id="avatar-toolbox-grid"></div>
              <button type="button" class="toolbox-close" data-i18n="btn_close">Zamknij</button>
            </div>
          </div>
          <div id="mood-toolbox" class="toolbox-overlay hidden" aria-label="Wybierz humor">
            <div class="toolbox-overlay-inner">
              <div class="toolbox-grid" id="mood-toolbox-grid"></div>
              <button type="button" class="toolbox-close" data-i18n="btn_close">Zamknij</button>
            </div>
          </div>
          <input type="hidden" id="profile-avatar" />
          <input type="hidden" id="profile-mood" />
          <label class="form-label"><span data-i18n="profile_bio">Opis</span></label>
          <textarea id="profile-bio" class="form-input form-input--textarea" maxlength="200" rows="1" placeholder="" data-i18n-placeholder="profile_bio_placeholder" title="max 200 znaków"></textarea>
          <label class="form-label"><span data-i18n="profile_interests">Zainteresowania</span></label>
          <button type="button" id="btn-toggle-interests" class="btn-interests" aria-label="Wybierz zainteresowania">
            <span class="btn-interests-label" data-i18n="profile_choose">Wybierz</span>
            <span id="interests-selected" class="interests-selected" aria-live="polite"></span>
          </button>
          <div id="interests-toolbox" class="interests-toolbox hidden" aria-label="Zainteresowania"></div>
          <label class="form-label"><span data-i18n="profile_tags">Dostępność</span></label>
          <div class="tag-buttons">
            <button type="button" class="btn-tag" data-tag="chat" data-i18n="profile_tag_chat">💬 Pogadać</button>
            <button type="button" class="btn-tag" data-tag="date" data-i18n="profile_tag_date">❤️ Randka</button>
            <button type="button" class="btn-tag" data-tag="beer" data-i18n="profile_tag_beer">🍺 Piwo</button>
          </div>
        </div>
        <button type="button" id="btn-enter-map" class="btn-primary" data-i18n="start_btn_enter">Wejdź na mapę</button>
        <div class="lang-switcher">
          <button type="button" class="btn-lang" data-lang="pl" title="Polski">PL</button>
          <button type="button" class="btn-lang" data-lang="en" title="English">EN</button>
        </div>
      </div>
    </section>

    <!-- Map -->
    <section id="screen-map" class="screen screen--map">
      <div id="map-container" class="map-container"></div>
      <div id="map-overlay" class="map-overlay">
        <div class="map-status-center">
          <div id="status-bar" class="status-bar">
            <span id="status-text" data-i18n="map_status_loading">Ładowanie…</span>
          </div>
          <div class="map-status-row">
            <input type="text" id="map-status-input" class="map-status-input" maxlength="120" placeholder="" data-i18n-placeholder="map_status_placeholder" title="" data-i18n-title="map_status_placeholder" />
          </div>
        </div>
        <p id="map-nearby-hint" class="map-nearby-hint" data-i18n="map_nearby">W pobliżu</p>
      </div>
      <button type="button" id="btn-profile-map" class="btn-fab" data-i18n-title="btn_profile" title="Profil">👤</button>
      <button type="button" id="btn-back" class="btn-back" data-i18n="btn_back">← Wstecz</button>
    </section>

    <!-- Chat overlay -->
    <div id="chat-overlay" class="chat-overlay hidden">
      <div class="chat-panel">
        <div class="chat-header">
          <span id="chat-with-name" data-i18n="chat_with">Z</span>
          <button type="button" id="btn-chat-close" class="btn-close" data-i18n="btn_close">Zamknij</button>
        </div>
        <div id="chat-messages" class="chat-messages"></div>
        <div class="chat-input-row">
          <input type="text" id="chat-input" class="chat-input" maxlength="500" placeholder="" data-i18n-placeholder="chat_placeholder" />
          <button type="button" id="btn-chat-send" class="btn-send" data-i18n="chat_send">Wyślij</button>
        </div>
      </div>
    </div>

    <div id="toast-container" class="toast-container" aria-live="polite"></div>
  </div>

  <script src="locales.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gun/sea.js"></script>
  <script src="js/core/config.js"></script>
  <script src="js/core/state.js"></script>
  <script src="js/storage/profile.js"></script>
  <script src="js/ui/locale.js"></script>
  <script src="js/map/map.js"></script>
  <script src="js/services/gun.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
